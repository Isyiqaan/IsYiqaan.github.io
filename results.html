<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0"
    >

    <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9591229850045984"
        crossorigin="anonymous"
    ></script>

    <title>Your Personality Results</title>

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com"
    >

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin
    >

    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="style.css"
    >
</head>

<body data-progress="100">

    <!-- FLOATING BACKGROUND BLOBS -->

    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>


    <!-- RESULTS CONTENT -->

    <main class="content">

        <p class="player-name">
            Congratulations,
            <span data-player-name></span>!
        </p>

        <h1>Your Personality</h1>

        <h2>
            Based on today's answers...
        </h2>


        <!-- PLAYER STREAK -->

        <div class="answer streak-result">
            🔥 Streak Day
            <span id="streakDay">1</span>
            Complete
        </div>

        <p class="results-message">
            Come back tomorrow!
        </p>


        <!-- RANDOM PERSONALITY RESULTS -->

        <div
            id="personalityResults"
            class="personalityResults"
        ></div>


        <!-- WHATSAPP SHARE BUTTON -->

        <button
            class="answer shareButton"
            type="button"
            onclick="shareResultsOnWhatsApp()"
        >
            📱 Share Results on WhatsApp
        </button>


        <!-- LEADERBOARD -->

        <h2 class="leaderboard-title">
            🏆 Streak Leaderboard
        </h2>

        <div id="leaderboard"></div>


        <p class="bottom-message">
            Come back tomorrow to continue your streak
            and climb the leaderboard!
        </p>

    </main>


    <!-- PROGRESS BAR -->

    <div class="progress">
        <div class="progressFill"></div>
    </div>


    <!-- SHARED JAVASCRIPT -->

    <script src="script.js"></script>

</body>

</html>
