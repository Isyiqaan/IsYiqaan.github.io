<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Question 1</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;

font-family:"Poppins",sans-serif;

}


body{

height:100vh;

display:flex;

justify-content:center;

align-items:center;

overflow:hidden;


background:linear-gradient(
-45deg,
#2e1065,
#581c87,
#7e22ce,
#a855f7,
#4c1d95
);


background-size:400% 400%;

animation:bgMove 12s ease infinite;

}



@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}



.quiz-box{

width:650px;

max-width:90%;

padding:50px;


background:rgba(255,255,255,.15);

backdrop-filter:blur(20px);


border-radius:30px;

border:1px solid rgba(255,255,255,.25);


text-align:center;

color:white;


animation:appear 1s ease;


}



@keyframes appear{

from{

opacity:0;

transform:translateY(40px);

}


to{

opacity:1;

transform:translateY(0);

}


}



h1{

font-size:50px;

margin-bottom:30px;

}


h2{

font-size:28px;

margin-bottom:30px;

}



.answer{

display:block;

width:100%;

margin:15px 0;

padding:15px;


border:none;

border-radius:15px;


font-size:18px;

cursor:pointer;


transition:.3s;


}



.answer:hover{

transform:scale(1.05);

}



.next{

margin-top:25px;

padding:15px 40px;

border:none;

border-radius:15px;

font-size:20px;

cursor:pointer;

background:white;

color:#7e22ce;


}



.next:hover{

transform:scale(1.08);

}



</style>

</head>


<body>


<div class="quiz-box">


<h1>Question 1</h1>


<h2>
PUT YOUR QUESTION HERE
</h2>


<button class="answer">
Answer 1
</button>


<button class="answer">
Answer 2
</button>


<button class="answer">
Answer 3
</button>


<button class="answer">
Answer 4
</button>



<a href="question2.html">

<button class="next">
Next Question ➜
</button>

</a>


</div>


</body>


</html>
