<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Question 3</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:linear-gradient(
-45deg,
#fdf4ff,
#f3e8ff,
#ede9fe,
#fce7f3,
#f5d0fe,
#e9d5ff
);

background-size:500% 500%;
animation:gradient 15s ease infinite;

}

@keyframes gradient{

0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}

}

.blob{

position:absolute;
border-radius:50%;
filter:blur(35px);
opacity:.45;
animation:floatBlob 12s ease-in-out infinite;

}

.blob:nth-child(1){

width:250px;
height:250px;
background:#f5d0fe;

top:-70px;
left:-60px;

}

.blob:nth-child(2){

width:180px;
height:180px;
background:#ddd6fe;

bottom:-40px;
right:-40px;

animation-duration:16s;

}

.blob:nth-child(3){

width:130px;
height:130px;
background:#fbcfe8;

top:20%;
right:15%;

animation-duration:18s;

}

@keyframes floatBlob{

0%{transform:translateY(0px);}
50%{transform:translateY(-45px);}
100%{transform:translateY(0px);}

}

.content{

text-align:center;
width:90%;
max-width:700px;

animation:floatContent 4s ease-in-out infinite;

z-index:10;

}

@keyframes floatContent{

0%{transform:translateY(0);}
50%{transform:translateY(-10px);}
100%{transform:translateY(0);}

}

h1{

font-size:58px;
color:#7e22ce;
margin-bottom:20px;

}

h2{

font-size:28px;
font-weight:600;
color:#6b21a8;

margin-bottom:40px;

}

.answer{

display:block;

width:100%;

margin:18px 0;

padding:18px;

font-size:20px;

font-weight:600;

border:none;

border-radius:999px;

cursor:pointer;

background:white;

color:#7e22ce;

transition:.3s;

box-shadow:0 10px 25px rgba(126,34,206,.18);

}

.answer:hover{

transform:translateY(-5px) scale(1.04);

box-shadow:0 20px 40px rgba(126,34,206,.25);

}

</style>

</head>

<body>

<div class="blob"></div>
<div class="blob"></div>
<div class="blob"></div>

<div class="content">

<h1>Question 3</h1>

<h2>PUT YOUR QUESTION HERE</h2>

<button class="answer" onclick="window.location.href='question4.html'">
Answer 1
</button>

<button class="answer" onclick="window.location.href='question4.html'">
Answer 2
</button>

<button class="answer" onclick="window.location.href='question4.html'">
Answer 3
</button>

<button class="answer" onclick="window.location.href='question4.html'">
Answer 4
</button>

</div>

</body>

</html>
