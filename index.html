<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ultimate Quiz</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:"Poppins",sans-serif;
}

body{

height:100vh;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
-45deg,
#2e1065,
#581c87,
#7e22ce,
#a855f7,
#4c1d95
);

background-size:400% 400%;
animation:bgMove 12s ease infinite;

}


@keyframes bgMove{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}


.circle{

position:absolute;
border-radius:50%;

background:rgba(255,255,255,0.12);

backdrop-filter:blur(10px);

animation:float 12s infinite linear;

}


.circle:nth-child(1){

width:260px;
height:260px;

left:-80px;
top:-80px;

}


.circle:nth-child(2){

width:200px;
height:200px;

right:-60px;
bottom:-50px;

animation-duration:15s;

}


.circle:nth-child(3){

width:140px;
height:140px;

left:20%;
bottom:10%;

animation-duration:18s;

}


@keyframes float{

0%{
transform:translateY(0) rotate(0);
}

50%{
transform:translateY(-50px) rotate(180deg);
}

100%{
transform:translateY(0) rotate(360deg);
}

}


.card{

width:700px;
max-width:90%;

padding:60px;

border-radius:30px;

background:rgba(255,255,255,0.15);

border:1px solid rgba(255,255,255,0.25);

backdrop-filter:blur(20px);

box-shadow:0 25px 60px rgba(0,0,0,.3);

text-align:center;

animation:appear 1s ease;

}


@keyframes appear{

from{

opacity:0;
transform:translateY(40px);

}

to{

opacity:1;
transform:translateY(0);

}

}


h1{

font-size:65px;
font-weight:800;

color:white;

margin-bottom:20px;

}


p{

font-size:22px;

color:white;

opacity:.9;

margin-bottom:45px;

}


button{

padding:18px 50px;

font-size:22px;

font-weight:700;

border:none;

border-radius:15px;

cursor:pointer;

background:white;

color:#7e22ce;

transition:.35s;

}


button:hover{

transform:scale(1.08) translateY(-5px);

box-shadow:0 15px 40px rgba(255,255,255,.4);

}


footer{

position:absolute;

bottom:25px;

color:white;

opacity:.7;

}

</style>

</head>


<body>


<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>


<div class="card">

<h1>Ultimate Quiz</h1>

<p>
Challenge yourself with exciting quizzes and see how many answers you can get right.
</p>


<button onclick="window.location.href='question1.html'">
Start Quiz
</button>


</div>


<footer>
© 2026 Ultimate Quiz
</footer>


</body>

</html>
