<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ultimate Quiz</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,Helvetica,sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:linear-gradient(135deg,#1e3c72,#2a5298);
      color:white;
    }

    .box{
      background:rgba(255,255,255,.12);
      backdrop-filter:blur(12px);
      padding:50px;
      border-radius:20px;
      text-align:center;
      width:420px;
    }

    h1{
      font-size:50px;
      margin-bottom:15px;
    }

    p{
      margin-bottom:35px;
      font-size:18px;
    }

    button{
      padding:16px 45px;
      font-size:20px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      background:white;
      color:#1e3c72;
      transition:.3s;
    }

    button:hover{
      transform:scale(1.05);
    }
  </style>
</head>
<body>

<div class="box">
    <h1>Ultimate Quiz</h1>
    <p>Think you can get every question correct?</p>

    <button onclick="alert('Next we will build the quiz page!')">
      Start Quiz
    </button>
</div>

</body>
</html>
